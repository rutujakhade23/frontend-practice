<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sub and sup</title>
</head>
<body>
    <!--superscript-->
    <h1>a<sup>2</sup>+ b<sup>2</sup> = c<sup>2</sup></h1>
    <!--Subscript-->
    <h2>H<sub>2</sub>O</h2>
    <!--Practice qs-->
    <h3>Pythagoras Theorem Says a<sup>2</sup>+ b<sup>2</sup>= c<sup>2</sup></h3>
    <h4>Formula for glucose is C<sub>6</sub>H<sub>12</sub>O<sub>6</sub></h4>
    
</body>
</html>
