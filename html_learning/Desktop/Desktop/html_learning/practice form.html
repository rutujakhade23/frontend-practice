<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML3</title>
</head>
<body>
     <h1>Registration form</h1>
        <form action="/server">
            <input type="text" placeholder="Enter first name" name="FN"/>
            <input type="text" placeholder="Enter last name" name="LN"/>
            <div>
                Please select your gender:
                <select name="gender"id="gender">
                    <option value="male">Male</option>
                    <option value="female">female</option>
                    <option value="others">Others</option>
                </select>
            </div>
            <div>
                Do you agree terms of service:
                <input type ="checkbox" id="yes"name="tos"value="yes"> 
                <label for="yes">yes</label> ,I agree
            </div>
            <button>Register</button>
        </form>

</body>
</html>
